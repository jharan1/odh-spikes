# Secrets and ConfigMaps for the demo-vector-stores-e2e namespace.
#
# Apply with:
#   oc apply -f 02-secrets-and-configmaps.yaml
---
apiVersion: v1
kind: Secret
metadata:
  name: pgvector-bff-credentials
  namespace: demo-vector-stores-e2e
type: Opaque
stringData:
  password: vectorpassword
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gen-ai-aa-custom-model-endpoints
  namespace: demo-vector-stores-e2e
data:
  config.yaml: |
    providers:
      inference:
      - provider_id: granite-embed-provider
        provider_type: remote::passthrough
        config:
          base_url: http://granite-embedding-r2-predictor.demo-vector-stores-e2e.svc.cluster.local
    registered_resources:
      models:
      - provider_id: granite-embed-provider
        model_id: RedHatAI/granite-embedding-english-r2
        model_type: embedding
        metadata:
          display_name: Granite Embedding R2
          embedding_dimension: 768
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gen-ai-aa-vector-stores
  namespace: demo-vector-stores-e2e
data:
  config.yaml: |
    providers:
      vector_io:
        - provider_id: pgvector-bff-provider
          provider_type: remote::pgvector
          config:
            host: pgvector2.pgvect.svc.cluster.local
            port: 5432
            db: vectordb
            user: vectoruser
            distance_metric: COSINE
            persistence:
              backend: kv_default
              namespace: vector_io::pgvector-bff-provider
            custom_gen_ai:
              credentials:
                secretRefs:
                  - name: pgvector-bff-credentials
                    key: password
    registered_resources:
      vector_stores:
        - provider_id: pgvector-bff-provider
          vector_store_id: vs_bff00003-0000-0000-0000-000000000001
          vector_store_name: "Weather Knowledge Base (Remote Embedding)"
          embedding_model: RedHatAI/granite-embedding-english-r2
          embedding_dimension: 768
          metadata:
            description: "Vector store with weather information (uses remote granite embedding)"
