apiVersion: v1
kind: ConfigMap
metadata:
  name: gen-ai-aa-vector-stores
  namespace: proj1
data:
  config.yaml: |
    providers:
      vector_io:
        - provider_id: pgvector-bff-provider
          provider_type: remote::pgvector
          config:
            host: pgvector2.pgvect.svc.cluster.local
            port: 5432
            db: vectordb
            user: vectoruser
            distance_metric: COSINE
            persistence:
              backend: kv_default
              namespace: vector_io::pgvector-bff-provider
            custom_gen_ai:
              credentials:
                secretRefs:
                  - name: pgvector-bff-credentials
                    key: password

    registered_resources:
      vector_stores:
        - provider_id: pgvector-bff-provider
          vector_store_id: vs_bff00001-0000-0000-0000-000000000001
          vector_store_name: "Weather Knowledge Base"
          embedding_model: sentence-transformers/ibm-granite/granite-embedding-125m-english
          embedding_dimension: 768
          metadata:
            description: "Vector store with weather information"
        - provider_id: pgvector-bff-provider
          vector_store_id: vs_bff00002-0000-0000-0000-000000000001
          vector_store_name: "Product Knowledge Base"
          embedding_model: sentence-transformers/ibm-granite/granite-embedding-125m-english
          embedding_dimension: 768
          metadata:
            description: "Vector store with product information"
