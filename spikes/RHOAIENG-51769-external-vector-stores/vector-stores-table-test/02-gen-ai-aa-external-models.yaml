# Simulates two external embedding models registered via the "Create external endpoint" modal.
# In production, the BFF writes this ConfigMap when a user registers an external model endpoint.
# Here we apply it manually to set up the test scenario.
#
# - external-model-provider-1: registers test-fake-external-embedding
#   → will show as "available" in the vector stores table (in allModels, NOT in llamastack)
# - external-model-provider-2: registers test-fake-registered-external-embedding
#   → will show as "registered" in the vector stores table, so with a green check (in allModels AND in llamastack,
#     because 04-llama-stack-config.yaml also registers it in the LSD)
#
# Apply with:
#   kubectl apply -f 02-gen-ai-aa-external-models.yaml -n proj1
---
apiVersion: v1
kind: Secret
metadata:
  name: external-model-provider-api-key-1
  namespace: proj1
type: Opaque
stringData:
  api_key: "0"
---
apiVersion: v1
kind: Secret
metadata:
  name: external-model-provider-api-key-2
  namespace: proj1
type: Opaque
stringData:
  api_key: "0"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gen-ai-aa-external-models
  namespace: proj1
data:
  config.yaml: |
    providers:
      inference:
      - provider_id: external-model-provider-1
        provider_type: remote::vllm
        config:
          base_url: https://foo
          custom_gen_ai:
            api_key:
              secretRef:
                name: external-model-provider-api-key-1
                key: api_key
      - provider_id: external-model-provider-2
        provider_type: remote::vllm
        config:
          base_url: https://foo
          custom_gen_ai:
            api_key:
              secretRef:
                name: external-model-provider-api-key-2
                key: api_key
    registered_resources:
      models:
      - provider_id: external-model-provider-1
        model_id: test-fake-external-embedding
        model_type: embedding
        metadata:
          display_name: test-fake-external-embedding
          embedding_dimension: 768
      - provider_id: external-model-provider-2
        model_id: test-fake-registered-external-embedding
        model_type: embedding
        metadata:
          display_name: Fake embedding model that will be registered in LS for test
          embedding_dimension: 768
